<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Research Tree — Layout Ideas</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel2: #1e222b;
    --border: #2a2f3a;
    --hot: #f5d889;
    --text: #e6e8ee;
    --muted: #8a93a6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font: 15px/1.5 -apple-system, Segoe UI, Roboto, sans-serif; }
  header { padding: 22px 32px 14px; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, #171a22 0%, #11141b 100%); position: sticky; top: 0; z-index: 10; }
  header h1 { margin: 0; font-size: 22px; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  main { max-width: 1240px; margin: 0 auto; padding: 22px 20px 120px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  .opt { background: var(--panel); border: 2px solid var(--border); border-radius: 10px; padding: 14px 14px 12px; cursor: pointer; transition: border-color 0.12s, transform 0.08s; display: flex; flex-direction: column; gap: 8px; user-select: none; }
  .opt:hover { border-color: #4a5060; transform: translateY(-1px); }
  .opt.selected { border-color: var(--hot); box-shadow: 0 0 0 1px rgba(245,216,137,0.28) inset; background: #1a1b20; }
  .visual { width: 100%; aspect-ratio: 5 / 3; background: #0b0d11; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .visual > svg, .visual > .htmlmock { width: 100%; height: 100%; display: block; }
  .visual .htmlmock { padding: 12px; color: #e8d9b8; font: 10px/1.3 -apple-system, Segoe UI, sans-serif; background: #1a0e05; }
  .label { font-size: 15px; font-weight: 600; color: var(--hot); }
  .desc { font-size: 12.5px; color: #bfc5d1; line-height: 1.45; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
  .tags span { font-size: 10px; padding: 2px 8px; background: #1a2028; border: 1px solid #2a3040; border-radius: 10px; color: #9aa4b8; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .tags span.pro { border-color: #3a5a28; color: #8ebb5a; background: #192418; }
  .tags span.con { border-color: #5a3a3a; color: #d48a7a; background: #241818; }
  footer { position: fixed; bottom: 0; left: 0; right: 0; background: #11141b; border-top: 1px solid var(--border); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; gap: 12px; z-index: 10; }
  footer #progress { color: var(--muted); font-size: 13px; }
  footer button { background: var(--hot); color: #0b1020; border: 0; padding: 10px 18px; font-weight: 700; border-radius: 6px; cursor: pointer; font-size: 13px; letter-spacing: 0.3px; }
  footer button:disabled { opacity: 0.45; cursor: not-allowed; }
  footer button.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); font-weight: 500; }

  dialog { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 0; width: min(560px, 92vw); }
  dialog::backdrop { background: rgba(0,0,0,0.6); }
  dialog .hd { padding: 14px 18px; border-bottom: 1px solid var(--border); font-weight: 600; color: var(--hot); }
  dialog .body { padding: 16px 18px; }
  dialog .ft { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  dialog button { padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; border: 1px solid var(--border); background: transparent; color: var(--text); }
  dialog button.primary { background: var(--hot); color: #0b1020; border: 0; font-weight: 600; }
</style>
</head>
<body>

<header>
  <h1>Research Tree — How should it look?</h1>
  <p>Each preview is a realistic mockup with sample nodes/upgrades. Pick the style that fits best, then we'll build it.</p>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer>
  <div id="progress">Pick a layout</div>
  <div style="display:flex; gap:8px;">
    <button class="secondary" id="clearBtn">Clear</button>
    <button id="confirmBtn" disabled>Use this style</button>
  </div>
</footer>

<dialog id="confirmDlg">
  <div class="hd">Confirm layout</div>
  <div class="body" id="confirmBody"></div>
  <div class="ft">
    <button onclick="document.getElementById('confirmDlg').close()">Keep browsing</button>
    <button class="primary" onclick="confirmChoice()">Use this</button>
  </div>
</dialog>

// ---------- render ----------
const STORAGE_KEY = 'researchTreeChoice';
let picked = null;
try { picked = localStorage.getItem(STORAGE_KEY); } catch {}

const grid = document.getElementById('grid');
options.forEach(o => {
  const el = document.createElement('div');
  el.className = 'opt' + (picked === o.value ? ' selected' : '');
  el.dataset.value = o.value;
  el.innerHTML = `
    <div class="visual">${o.visual}</div>
    <div class="label">${o.label}</div>
    <div class="desc">${o.desc}</div>
    <div class="tags">${o.tags.map(t => `<span class="${t.pro?'pro':t.con?'con':''}">${t.t}</span>`).join('')}</div>
  `;
  el.addEventListener('click', () => {
    picked = o.value;
    try { localStorage.setItem(STORAGE_KEY, picked); } catch {}
    document.querySelectorAll('.opt').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    updateProgress();
  });
  grid.appendChild(el);
});

function updateProgress() {
  const opt = options.find(o => o.value === picked);
  document.getElementById('progress').textContent = opt ? `Picked: ${opt.label}` : 'Pick a layout';
  document.getElementById('confirmBtn').disabled = !opt;
}
updateProgress();

// ---------- confirm flow ----------
document.getElementById('confirmBtn').addEventListener('click', () => {
  const opt = options.find(o => o.value === picked);
  if (!opt) return;
  document.getElementById('confirmBody').innerHTML = `
    <p style="margin:0 0 10px;">We'll use <b style="color:var(--hot);">${opt.label}</b> for the research tree.</p>
    <p style="margin:0; color:var(--muted); font-size:13px;">${opt.desc}</p>
  `;
  document.getElementById('confirmDlg').showModal();
});

window.confirmChoice = function () {
  document.getElementById('confirmDlg').close();
  const opt = options.find(o => o.value === picked);
  document.getElementById('progress').textContent = `Locked in: ${opt.label}. Tell Claude you're done.`;
};

document.getElementById('clearBtn').addEventListener('click', () => {
  picked = null;
  try { localStorage.removeItem(STORAGE_KEY); } catch {}
  document.querySelectorAll('.opt').forEach(e => e.classList.remove('selected'));
  updateProgress();
});
</script>
