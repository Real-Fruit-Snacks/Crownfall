<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" shape-rendering="crispEdges">
  <!-- ============================================================
       OG IMAGE (1200x630) — "in-game scene" composition
       Built like a poster: pixel-art wall on the left, heroes
       firing into a horde of enemies, hazards in the field,
       chunky title plate overlaid in the lower-third.
       ============================================================ -->

  <!-- BACKGROUND -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%"  stop-color="#3a2410"/>
      <stop offset="55%" stop-color="#1a0e05"/>
      <stop offset="100%" stop-color="#0a0500"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- ============================================================
       SCENE — actual game look. Uses 8x scale: each "game pixel"
       is an 8x8 SVG rect. Wall is ~58 game-px (= 464 SVG-px) wide.
       Scene viewport: y=0..420 (the upper 2/3 of the poster)
       ============================================================ -->

  <!-- GRASS FIELD (right of wall) -->
  <g id="grass">
    <rect x="464" y="0" width="736" height="420" fill="#5a8a30"/>
    <!-- darker speckles -->
    <g fill="#3a6a1a">
      <rect x="500" y="40"  width="16" height="8"/>
      <rect x="620" y="80"  width="24" height="8"/>
      <rect x="780" y="120" width="16" height="8"/>
      <rect x="900" y="60"  width="20" height="8"/>
      <rect x="1080" y="180" width="16" height="8"/>
      <rect x="540" y="200" width="20" height="8"/>
      <rect x="700" y="240" width="16" height="8"/>
      <rect x="860" y="290" width="24" height="8"/>
      <rect x="1020" y="340" width="16" height="8"/>
      <rect x="600" y="370" width="20" height="8"/>
      <rect x="780" y="380" width="16" height="8"/>
      <rect x="940" y="200" width="16" height="8"/>
      <rect x="1100" y="260" width="20" height="8"/>
    </g>
    <!-- light highlights -->
    <g fill="#7aaa48">
      <rect x="520" y="20" width="8" height="8"/>
      <rect x="640" y="50" width="8" height="8"/>
      <rect x="760" y="90" width="8" height="8"/>
      <rect x="880" y="160" width="8" height="8"/>
      <rect x="1000" y="100" width="8" height="8"/>
      <rect x="700" y="180" width="8" height="8"/>
      <rect x="820" y="260" width="8" height="8"/>
      <rect x="960" y="330" width="8" height="8"/>
      <rect x="1080" y="380" width="8" height="8"/>
      <rect x="560" y="320" width="8" height="8"/>
      <rect x="720" y="350" width="8" height="8"/>
      <rect x="880" y="80" width="8" height="8"/>
    </g>
    <!-- yellow flowers -->
    <g fill="#f5d889">
      <rect x="690" y="100" width="8" height="8"/>
      <rect x="850" y="220" width="8" height="8"/>
      <rect x="1000" y="280" width="8" height="8"/>
      <rect x="1100" y="120" width="8" height="8"/>
      <rect x="580" y="300" width="8" height="8"/>
      <rect x="950" y="380" width="8" height="8"/>
    </g>
  </g>

  <!-- WALL (left side) — STEEL material palette for a polished look -->
  <g id="wall">
    <!-- walkway base -->
    <rect x="0" y="0" width="400" height="420" fill="#5a606a"/>
    <!-- horizontal mortar lines (every 88 SVG-px = 11 game-px x 8 scale) -->
    <g fill="#0e1218">
      <rect x="0" y="88"  width="400" height="8"/>
      <rect x="0" y="176" width="400" height="8"/>
      <rect x="0" y="264" width="400" height="8"/>
      <rect x="0" y="352" width="400" height="8"/>
    </g>
    <!-- vertical mortar lines (running-bond, blockW = 128) -->
    <g fill="#0e1218">
      <rect x="128" y="0"   width="8" height="88"/>
      <rect x="256" y="0"   width="8" height="88"/>
      <rect x="384" y="0"   width="8" height="88"/>
      <rect x="64"  y="88"  width="8" height="88"/>
      <rect x="192" y="88"  width="8" height="88"/>
      <rect x="320" y="88"  width="8" height="88"/>
      <rect x="128" y="176" width="8" height="88"/>
      <rect x="256" y="176" width="8" height="88"/>
      <rect x="384" y="176" width="8" height="88"/>
      <rect x="64"  y="264" width="8" height="88"/>
      <rect x="192" y="264" width="8" height="88"/>
      <rect x="320" y="264" width="8" height="88"/>
      <rect x="128" y="352" width="8" height="68"/>
      <rect x="256" y="352" width="8" height="68"/>
      <rect x="384" y="352" width="8" height="68"/>
    </g>
    <!-- block highlights (sheen — vertical 1px stroke per block) -->
    <g fill="#9aa0ac">
      <rect x="40"  y="8"   width="8" height="76"/>
      <rect x="168" y="8"   width="8" height="76"/>
      <rect x="296" y="8"   width="8" height="76"/>
      <rect x="100" y="96"  width="8" height="76"/>
      <rect x="228" y="96"  width="8" height="76"/>
      <rect x="356" y="96"  width="8" height="76"/>
      <rect x="40"  y="184" width="8" height="76"/>
      <rect x="168" y="184" width="8" height="76"/>
      <rect x="296" y="184" width="8" height="76"/>
      <rect x="100" y="272" width="8" height="76"/>
      <rect x="228" y="272" width="8" height="76"/>
      <rect x="356" y="272" width="8" height="76"/>
      <rect x="40"  y="360" width="8" height="60"/>
      <rect x="168" y="360" width="8" height="60"/>
      <rect x="296" y="360" width="8" height="60"/>
    </g>
    <!-- bolt rivets at block corners (Steel material flourish) -->
    <g fill="#1a1e28">
      <rect x="16"  y="16"  width="8" height="8"/><rect x="112" y="72"  width="8" height="8"/>
      <rect x="144" y="16"  width="8" height="8"/><rect x="240" y="72"  width="8" height="8"/>
      <rect x="272" y="16"  width="8" height="8"/><rect x="368" y="72"  width="8" height="8"/>
      <rect x="80"  y="104" width="8" height="8"/><rect x="176" y="160" width="8" height="8"/>
      <rect x="208" y="104" width="8" height="8"/><rect x="304" y="160" width="8" height="8"/>
      <rect x="336" y="104" width="8" height="8"/>
      <rect x="16"  y="192" width="8" height="8"/><rect x="112" y="248" width="8" height="8"/>
      <rect x="144" y="192" width="8" height="8"/><rect x="240" y="248" width="8" height="8"/>
      <rect x="272" y="192" width="8" height="8"/><rect x="368" y="248" width="8" height="8"/>
      <rect x="80"  y="280" width="8" height="8"/><rect x="176" y="336" width="8" height="8"/>
      <rect x="208" y="280" width="8" height="8"/><rect x="304" y="336" width="8" height="8"/>
      <rect x="336" y="280" width="8" height="8"/>
    </g>

    <!-- inner parapet edge (left lip) -->
    <rect x="0" y="0" width="16" height="420" fill="#3a3e48"/>
    <rect x="0" y="0" width="8"  height="420" fill="#1a1e28"/>

    <!-- merlon strip (rightmost ~64px) - alternating merlon (104 tall) / crenel (64 tall) -->
    <g id="merlons">
      <!-- pattern: M(104) C(64) M(104) C(64) M(104) — total 440 (slightly clipped) -->
      <!-- merlon body color -->
      <g fill="#5a606a">
        <rect x="400" y="0"   width="64" height="104"/>
        <rect x="400" y="168" width="64" height="104"/>
        <rect x="400" y="336" width="64" height="84"/>
      </g>
      <!-- merlon top highlights -->
      <g fill="#9aa0ac">
        <rect x="400" y="0"   width="64" height="16"/>
        <rect x="400" y="168" width="64" height="16"/>
        <rect x="400" y="336" width="64" height="16"/>
      </g>
      <!-- merlon bottom shadow -->
      <g fill="#3a3e48">
        <rect x="400" y="88"  width="64" height="16"/>
        <rect x="400" y="256" width="64" height="16"/>
        <rect x="400" y="404" width="64" height="16"/>
      </g>
      <!-- crenels (gaps) -->
      <g fill="#3a3e48">
        <rect x="400" y="104" width="64" height="64"/>
        <rect x="400" y="272" width="64" height="64"/>
      </g>
      <!-- outer edge shadow -->
      <g fill="#1a1e28">
        <rect x="456" y="0" width="8" height="420"/>
      </g>
      <!-- soft cast shadow onto grass -->
      <rect x="464" y="0" width="24" height="420" fill="rgba(10,6,2,0.35)"/>
    </g>
  </g>

  <!-- HEROES on the wall (3 visible, varied classes) -->
  <!-- ARCHER (top) - blue body -->
  <g id="hero-archer" transform="translate(160, 60)">
    <rect x="-8" y="40" width="24" height="8" fill="#2a1f14"/> <!-- legs -->
    <rect x="-8" y="8"  width="24" height="32" fill="#3e4f8a"/> <!-- body -->
    <rect x="0"  y="8"  width="8"  height="16" fill="#5a6fa8"/> <!-- body hi -->
    <rect x="-8" y="24" width="24" height="8"  fill="#6b4a2a"/> <!-- belt -->
    <rect x="-8" y="0"  width="24" height="8"  fill="#e4b37a"/> <!-- face -->
    <rect x="-8" y="-8" width="24" height="8"  fill="#a0a0a8"/> <!-- hat -->
    <rect x="-8" y="-8" width="8"  height="8"  fill="#c8c8d0"/> <!-- hat hi -->
    <!-- bow -->
    <rect x="16" y="0"  width="8" height="40" fill="#5a3a1a"/>
    <rect x="16" y="0"  width="8" height="8"  fill="#e8dcaa"/>
    <rect x="16" y="32" width="8" height="8"  fill="#e8dcaa"/>
  </g>

  <!-- MAGE (middle) - purple body -->
  <g id="hero-mage" transform="translate(160, 200)">
    <rect x="-8" y="40" width="24" height="8" fill="#2a1f14"/>
    <rect x="-8" y="8"  width="24" height="32" fill="#4a2a6a"/>
    <rect x="0"  y="8"  width="8"  height="16" fill="#6a3a8a"/>
    <rect x="-8" y="24" width="24" height="8"  fill="#6b4a2a"/>
    <rect x="-8" y="0"  width="24" height="8"  fill="#e4b37a"/>
    <rect x="-8" y="-8" width="24" height="8"  fill="#2a1038"/>
    <rect x="-8" y="-8" width="8"  height="8"  fill="#5a2a78"/>
    <!-- staff with crystal orb -->
    <rect x="16" y="-8" width="8"  height="48" fill="#4a2a18"/>
    <rect x="16" y="-24" width="8" height="8"  fill="#e4b4ff"/>
    <rect x="8"  y="-16" width="8" height="8"  fill="#b07bd6"/>
    <rect x="24" y="-16" width="8" height="8"  fill="#b07bd6"/>
    <rect x="16" y="-24" width="8" height="8"  fill="#ffffff"/>
  </g>

  <!-- CANNONEER (bottom) - red body -->
  <g id="hero-cannoneer" transform="translate(160, 340)">
    <rect x="-8" y="40" width="24" height="8" fill="#2a1f14"/>
    <rect x="-8" y="8"  width="24" height="32" fill="#6a2818"/>
    <rect x="0"  y="8"  width="8"  height="16" fill="#8a3820"/>
    <rect x="-8" y="24" width="24" height="8"  fill="#6b4a2a"/>
    <rect x="-8" y="0"  width="24" height="8"  fill="#e4b37a"/>
    <rect x="-8" y="-8" width="24" height="8"  fill="#1a1a20"/>
    <rect x="-8" y="-8" width="8"  height="8"  fill="#3a3a40"/>
    <!-- cannon barrel -->
    <rect x="16" y="8"  width="24" height="16" fill="#2a2a2e"/>
    <rect x="16" y="8"  width="24" height="8"  fill="#55555e"/>
    <rect x="32" y="16" width="8"  height="8"  fill="#0a0a0e"/>
    <rect x="24" y="8"  width="8"  height="16" fill="#88888e"/>
    <!-- muzzle flash -->
    <rect x="40" y="16" width="8"  height="8"  fill="#ffe080"/>
    <rect x="48" y="16" width="8"  height="8"  fill="#ffba40"/>
    <rect x="56" y="16" width="8"  height="8"  fill="#ff7030"/>
  </g>

  <!-- PROJECTILES — arrow + cannonball + magic bolt mid-flight -->
  <!-- archer arrow -->
  <g transform="translate(360, 80)">
    <rect x="0" y="0"  width="16" height="8" fill="#c89b4a"/>
    <rect x="16" y="0" width="8" height="8" fill="#e8e0c0"/>
    <rect x="-8" y="-8" width="8" height="8" fill="#a8413a"/>
    <rect x="-8" y="8" width="8" height="8" fill="#a8413a"/>
  </g>

  <!-- magic bolt -->
  <g transform="translate(380, 220)">
    <rect x="-8" y="0"  width="8" height="8"  fill="#7a3a9a"/>
    <rect x="0"  y="0"  width="16" height="8" fill="#b07bd6"/>
    <rect x="8"  y="-8" width="8" height="8"  fill="#b07bd6"/>
    <rect x="8"  y="8"  width="8" height="8"  fill="#b07bd6"/>
    <rect x="8"  y="0"  width="8" height="8"  fill="#e4b4ff"/>
    <rect x="16" y="0"  width="8" height="8"  fill="#ffffff"/>
  </g>

  <!-- cannonball -->
  <g transform="translate(420, 360)">
    <rect x="0" y="0"  width="24" height="24" fill="#2a2a2e"/>
    <rect x="0" y="0"  width="8"  height="8"  fill="#55555e"/>
    <rect x="16" y="16" width="8" height="8"  fill="#0a0a0e"/>
    <rect x="8" y="-16" width="8" height="8"  fill="#ffa030"/>
    <rect x="16" y="-16" width="8" height="8" fill="#ffe080"/>
  </g>

  <!-- ENEMIES — goblins approaching from the right -->
  <g id="enemy-goblin-1" transform="translate(900, 80)">
    <rect x="-16" y="32" width="40" height="8"  fill="rgba(10,6,2,0.55)"/> <!-- shadow -->
    <rect x="-8"  y="0"  width="24" height="32" fill="#2c4a10"/> <!-- body dark -->
    <rect x="0"   y="8"  width="8"  height="16" fill="#3a6a1a"/> <!-- body mid -->
    <rect x="-8"  y="-16" width="24" height="16" fill="#4a8a28"/> <!-- head -->
    <rect x="-8"  y="-8" width="8"  height="8"  fill="#ff3030"/> <!-- left eye -->
    <rect x="8"   y="-8" width="8"  height="8"  fill="#ff3030"/> <!-- right eye -->
    <rect x="-16" y="8"  width="8"  height="16" fill="#7a5236"/> <!-- club -->
  </g>
  <g id="enemy-goblin-2" transform="translate(740, 220)">
    <rect x="-16" y="32" width="40" height="8"  fill="rgba(10,6,2,0.55)"/>
    <rect x="-8"  y="0"  width="24" height="32" fill="#2c4a10"/>
    <rect x="0"   y="8"  width="8"  height="16" fill="#3a6a1a"/>
    <rect x="-8"  y="-16" width="24" height="16" fill="#4a8a28"/>
    <rect x="-8"  y="-8" width="8"  height="8"  fill="#ff3030"/>
    <rect x="8"   y="-8" width="8"  height="8"  fill="#ff3030"/>
    <rect x="-16" y="8"  width="8"  height="16" fill="#7a5236"/>
  </g>
  <g id="enemy-charger" transform="translate(820, 340)">
    <!-- red charger variant -->
    <rect x="-16" y="32" width="40" height="8"  fill="rgba(10,6,2,0.55)"/>
    <rect x="-8"  y="0"  width="24" height="32" fill="#5a1a0a"/>
    <rect x="0"   y="8"  width="8"  height="16" fill="#8a2a18"/>
    <rect x="-8"  y="-16" width="24" height="16" fill="#c84028"/>
    <rect x="-8"  y="-8" width="8"  height="8"  fill="#ffe860"/>
    <rect x="8"   y="-8" width="8"  height="8"  fill="#ffe860"/>
    <!-- jagged horn -->
    <rect x="-8"  y="-24" width="8" height="8"  fill="#ffd060"/>
    <rect x="8"   y="-24" width="8" height="8"  fill="#ffd060"/>
  </g>

  <!-- A BOSS in the back (gives a hint of late-game stakes) -->
  <g id="boss" transform="translate(1080, 200)">
    <rect x="-32" y="48" width="72" height="16" fill="rgba(10,6,2,0.65)"/>
    <rect x="-24" y="0"  width="56" height="48" fill="#1e3808"/>
    <rect x="-8"  y="8"  width="24" height="24" fill="#335a10"/>
    <rect x="-24" y="-32" width="56" height="24" fill="#3a6a18"/>
    <rect x="-24" y="-16" width="56" height="8"  fill="#22460a"/>
    <!-- crown -->
    <rect x="-24" y="-40" width="56" height="8"  fill="#f5d889"/>
    <rect x="-24" y="-48" width="8"  height="8"  fill="#f5d889"/>
    <rect x="0"   y="-48" width="8"  height="8"  fill="#f5d889"/>
    <rect x="24"  y="-48" width="8"  height="8"  fill="#f5d889"/>
    <!-- glowing eyes -->
    <rect x="-16" y="-24" width="8"  height="8"  fill="#ff2020"/>
    <rect x="16"  y="-24" width="8"  height="8"  fill="#ff2020"/>
    <!-- tusks -->
    <rect x="-16" y="-8"  width="8"  height="8"  fill="#e8d9a8"/>
    <rect x="16"  y="-8"  width="8"  height="8"  fill="#e8d9a8"/>
  </g>

  <!-- HAZARDS in the field -->
  <!-- Spike row near the wall -->
  <g fill="#3a2008">
    <rect x="540" y="40" width="8" height="8"/>
    <rect x="540" y="120" width="8" height="8"/>
    <rect x="540" y="160" width="8" height="8"/>
    <rect x="540" y="280" width="8" height="8"/>
    <rect x="540" y="320" width="8" height="8"/>
  </g>
  <g fill="#7a4818">
    <rect x="540" y="48" width="8" height="24"/>
    <rect x="540" y="128" width="8" height="24"/>
    <rect x="540" y="168" width="8" height="24"/>
    <rect x="540" y="288" width="8" height="24"/>
    <rect x="540" y="328" width="8" height="24"/>
  </g>
  <!-- A brazier with flame -->
  <g transform="translate(700, 120)">
    <rect x="-8" y="16" width="24" height="8" fill="#2a1a08"/>
    <rect x="-16" y="0" width="40" height="16" fill="#6a3a18"/>
    <rect x="-16" y="0" width="40" height="8"  fill="#a87a3e"/>
    <rect x="0"  y="-16" width="8" height="16" fill="#ffb030"/>
    <rect x="0"  y="-24" width="8" height="8"  fill="#ffe080"/>
    <rect x="-8" y="-8" width="8"  height="8"  fill="#ff7030"/>
  </g>
  <!-- A tar pit -->
  <ellipse cx="950" cy="380" rx="56" ry="20" fill="#1a0e1a"/>
  <ellipse cx="950" cy="378" rx="40" ry="12" fill="#0a040e"/>
  <rect x="940" y="372" width="8" height="8" fill="#3a1a3a"/>
  <rect x="965" y="380" width="8" height="8" fill="#3a1a3a"/>

  <!-- Some coin pickups on the field -->
  <g fill="#1a0e05">
    <rect x="610" y="200" width="24" height="16"/>
    <rect x="606" y="204" width="32" height="8"/>
  </g>
  <g fill="#f0c94a">
    <rect x="614" y="200" width="16" height="16"/>
    <rect x="610" y="204" width="24" height="8"/>
  </g>
  <g fill="#fff3a0">
    <rect x="618" y="204" width="8" height="4"/>
  </g>

  <g fill="#1a0e05">
    <rect x="780" y="300" width="24" height="16"/>
    <rect x="776" y="304" width="32" height="8"/>
  </g>
  <g fill="#f0c94a">
    <rect x="784" y="300" width="16" height="16"/>
    <rect x="780" y="304" width="24" height="8"/>
  </g>

  <!-- ============================================================
       TITLE PLATE — overlaid in the lower-third
       ============================================================ -->
  <defs>
    <linearGradient id="banner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5a3a18"/>
      <stop offset="100%" stop-color="#3a2616"/>
    </linearGradient>
  </defs>

  <!-- soft dark band behind the plate so it reads against the scene -->
  <rect x="0" y="420" width="1200" height="210" fill="rgba(10,6,2,0.65)"/>

  <g transform="translate(120, 440)">
    <!-- triple-inset chunky pixel border -->
    <rect x="-6" y="-6" width="972" height="172" fill="#1a0c00"/>
    <rect x="0"  y="0"  width="960" height="160" fill="#6a4528"/>
    <rect x="6"  y="6"  width="948" height="148" fill="#1a0c00"/>
    <rect x="12" y="12" width="936" height="136" fill="url(#banner)"/>

    <!-- title -->
    <text x="480" y="78"
          text-anchor="middle"
          font-family="'Press Start 2P', 'Courier New', monospace"
          font-size="60" font-weight="bold"
          fill="#f5d889"
          letter-spacing="8"
          stroke="#1a0c00" stroke-width="3" paint-order="stroke">CROWNFALL</text>
    <!-- subtitle -->
    <text x="480" y="124"
          text-anchor="middle"
          font-family="'Press Start 2P', 'Courier New', monospace"
          font-size="20"
          fill="#c89030"
          letter-spacing="5">AN INCREMENTAL DEFENSE</text>
  </g>

  <!-- Tagline at very bottom -->
  <text x="600" y="600"
        text-anchor="middle"
        font-family="'Press Start 2P', 'Courier New', monospace"
        font-size="14"
        fill="#a8957a"
        letter-spacing="3">HOLD THE WALL  &#183;  BANK CROWNS  &#183;  RETURN STRONGER</text>
</svg>
